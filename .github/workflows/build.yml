name: build

on:
  workflow_call:

jobs:
  generate-build-matrix:
    runs-on: ubuntu-latest
    name: Generate build matrix
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate matrix from versions.json
        id: generate-matrix
        run: |
          MATRIX=$(jq -c '{include: (.branches[""] | map({target: .}))}' ./versions/versions.json)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  build:
    needs: generate-build-matrix
    runs-on: ubuntu-latest
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-build-matrix.outputs.matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 25 with Gradle cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle
          cache-dependency-path: |
            **/*.gradle*
            **/gradle-wrapper.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Sanitize artifact name
        run: |
          raw="${{ matrix.target }}"
          clean="${raw%%:*}"
          echo "ARTIFACT_NAME=$clean" >> $GITHUB_ENV

      - name: Build ${{ matrix.target }}
        run: |
          ./gradlew "${{ env.ARTIFACT_NAME }}:build" --no-daemon --stacktrace